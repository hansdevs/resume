<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Dispatch">
  <defs>
    <linearGradient id="bg" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13161f"/>
      <stop offset="1" stop-color="#0a0c12"/>
    </linearGradient>
    <!-- One continuous diagonal brand gradient, split across the four tiles -->
    <linearGradient id="mark" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9DBBFF"/>
      <stop offset="0.5" stop-color="#4F7CFF"/>
      <stop offset="1" stop-color="#2A4AD6"/>
    </linearGradient>
    <!-- Per-tile glass highlight -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="14.25" fill="none" stroke="#ffffff" stroke-opacity="0.07"/>

  <!-- Dispatch mark: a 2x2 grid of rounded tiles -->
  <g>
    <rect x="12" y="12" width="18" height="18" rx="5" fill="url(#mark)"/>
    <rect x="34" y="12" width="18" height="18" rx="5" fill="url(#mark)"/>
    <rect x="12" y="34" width="18" height="18" rx="5" fill="url(#mark)"/>
    <rect x="34" y="34" width="18" height="18" rx="5" fill="url(#mark)"/>
    <rect x="12" y="12" width="18" height="18" rx="5" fill="url(#gloss)"/>
    <rect x="34" y="12" width="18" height="18" rx="5" fill="url(#gloss)"/>
    <rect x="12" y="34" width="18" height="18" rx="5" fill="url(#gloss)"/>
    <rect x="34" y="34" width="18" height="18" rx="5" fill="url(#gloss)"/>
  </g>
</svg>
